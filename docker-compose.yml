services:
  app:
    build:
      context: .
      args:
        VERSION: "${VERSION:-dev}"
    image: forge-site:${VERSION:-dev}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      BASE_URL: "${BASE_URL:-http://localhost:8080}"
      PORT: "8080"
      SECRET: "${SECRET}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:-}"
      DATABASE_PATH: "/app/data/forge.db"
    volumes:
      - forge_data:/app/data
    user: "1000:1000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/_health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  forge_data:
